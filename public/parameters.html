<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="settings_title">SafePass - Paramètres</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/style/colors.css">
    <link rel="stylesheet" type="text/css" href="/style/style.css">
    <link rel="stylesheet" type="text/css" href="/style/font.css">
    <link rel="stylesheet" type="text/css" href="/style/parameters.css">
    <link rel="stylesheet" type="text/css" href="/style/parameters-common.css">
    <!-- aws-widgets will be initialized after theme is applied (see end of <body>) -->
    <script type="module">
        import { initWidgets } from 'https://cdn.jsdelivr.net/gh/albericwalsh/aws-widgets@v0.1.3/dist/aws-widgets.es.js';
        await initWidgets();
        window.awsWidgetsReady = true;
    </script>
    <script type="module">
        // Initialize i18n before loading parameters_main so translations are available
        import { initI18n } from '/js/i18n.js';
        await initI18n();
    </script>
</head>
<body>
<header class="navbar navbar-dark sp-bg-dark fixed-top">
    <div class="header-content">
        <a class="navbar-brand sp-brand" href="./index.html">
            <img class="sp-brand-icon" id="sp-brand-icon" src="" alt="SafePass" />
            <span>SafePass</span>
        </a>
    </div>
</header>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar sp-bg-medium">
            <div class="sidebar-sticky" style="padding:0 8px; margin-top: var(--header-height);">
                <ul class="nav flex-column" id="params-sidebar">
                    <!-- sidebar items injected by JS -->
                </ul>
            </div>
        </nav>

        <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-4">
            <div id="params-content" style="padding:18px;">
                <h2 data-i18n="settings_title">Paramètres</h2>
                <div id="params-main-area">Choisissez une catégorie à gauche</div>
            </div>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="/js/parameters/common.js"></script>
<script src="/js/parameters/save_settings.js"></script>
<script src="/js/theme.js"></script>
<script type="module" src="js/parameters_main.js"></script>
<script type="module" src="js/parameters/categories/extension.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        try {
            const iconEl = document.getElementById('sp-brand-icon');
            if (!iconEl) return;
            const isFrontendDev = (window.location.port === '3000');
            const backendBase = `${window.location.protocol}//${window.location.hostname}:5000`;
            iconEl.src = isFrontendDev ? (backendBase + '/brand-icon') : '/brand-icon';
        } catch (e) {}
    });
</script>
</body>
</html>
