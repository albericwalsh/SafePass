<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePass</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="./style/colors.css">
    <link rel="stylesheet" type="text/css" href="./style/font.css">
    <link rel="stylesheet" type="text/css" href="./style/style.css">
    <!-- Initialize aws-widgets early so custom elements are defined before other scripts -->
    <script type="module">
        import { initWidgets } from 'https://cdn.jsdelivr.net/gh/albericwalsh/aws-widgets@v0.1.3/dist/aws-widgets.es.js';
        await initWidgets();
        window.awsWidgetsReady = true;
    </script>
    <script type="module">
        import { initI18n } from './js/i18n.js';
        // don't block other scripts here but initialize translations early
        initI18n().catch(e=>console.warn('i18n init failed', e));
    </script>
</head>
<body>
<header class="navbar navbar-dark sp-bg-dark fixed-top">
    <div class="header-content">
        <a class="navbar-brand" href="#" data-i18n="brand">SafePass</a>
        <div class="search-bar-header">
            <aws-button id="settings-button" data-i18n="settings">Paramètres</aws-button>
        </div>
    </div>
</header>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar sp-bg-medium">
            <div class="sidebar-sticky">
                <ul class="nav flex-column" style="margin-top: 56px;">
                    <li class="nav-item d-flex justify-content-between align-items-center">
                        <aws-button class="nav-link sp-link" data-category="sites" variant="primary" data-i18n="sites">Sites</aws-button>
                        <aws-icon-button class="add-btn" size="sm" variant="primary" data-category="sites"><span class="material-icons">add</span></aws-icon-button>
                    </li>
                    <li class="nav-item d-flex justify-content-between align-items-center">
                        <aws-button class="nav-link sp-link" data-category="applications" data-i18n="applications">Applications</aws-button>
                        <aws-icon-button class="add-btn" size="sm" variant="primary" data-category="applications"><span class="material-icons">add</span></aws-icon-button>
                    </li>
                    <li class="nav-item d-flex justify-content-between align-items-center">
                        <aws-button class="nav-link sp-link" data-category="autres" data-i18n="autres">Autres</aws-button>
                        <aws-icon-button class="add-btn" size="sm" variant="primary" data-category="autres"><span class="material-icons">add</span></aws-icon-button>
                    </li>
                </ul>
            </div>
        </nav>
        <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-4">
            <div class="search-bar">
                <aws-search id="search-input" data-i18n="search_placeholder" data-i18n-target="placeholder" placeholder="Rechercher..." variant="primary" clearable debounce="300"></aws-search>
            </div>
            <aws-table id="dynamic-table">
                <aws-table-head>
                    <aws-table-row id="table-headers">
                        <!-- Dynamic headers (aws-table-cell) -->
                    </aws-table-row>
                </aws-table-head>
                <aws-table-body id="dynamic-list">
                    <!-- Dynamic content will be inserted here (aws-table-row) -->
                </aws-table-body>
            </aws-table>
        </main>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
<script src="./js/theme.js"></script>
<script src="./js/auto_lock.js"></script>
<script src="./js/display.js"></script>
<script src="./js/saving.js"></script>
<script src="./js/password.js"></script>
<script src="./js/alert.js"></script>
<script src="./js/check_paths.js"></script>
<script src="./js/tools.js"></script>
<script src="./js/edit_form.js"></script>
<script src="./js/add_form.js"></script>
<script>

    let allData = []; // Store all data for search
    let currentCategory = 'sites'; // Default category
    let sortOrder = {}; // Object to track sort orders
    let deleteCancelTmp = null; // Temporary variable to store the delete cancel function

    $(document).ready(function () {

        // Sorting temporarily disabled (was attached to .sortable headers)

        // Change category on button click — support custom aws-button elements
        $('nav [data-category]:not(.add-btn)').on('click', function (e) {
            e.preventDefault();
            $('nav [data-category]').removeClass('active');
            $(this).addClass('active');
            let category = $(this).attr('data-category');
            displayCategory(category);
        });

        // Active category search filter (works with aws-search custom element)
        (function() {
            const searchEl = document.getElementById('search-input');
            const getValue = () => (searchEl && (searchEl.value || searchEl.getAttribute('value') || '')).toString().toLowerCase();
            const handleSearch = () => {
                const value = getValue();
                $('#dynamic-list aws-table-row').filter(function () {
                    const ds = ($(this).attr('data-search') || '').toString().toLowerCase();
                    const txt = ds || $(this).text().toLowerCase();
                    $(this).toggle(txt.indexOf(value) > -1);
                });
            };
            if (searchEl) {
                searchEl.addEventListener('input', handleSearch);
                searchEl.addEventListener('change', handleSearch);
                searchEl.addEventListener('value-changed', handleSearch);
            }
        })();


        // Add new item to the current category
        $('.add-btn').on('click', function (e) {
            e.preventDefault();
            let category = $(this).attr('data-category');
            showAddForm(category);
        });

        // Paramètres — open dedicated page
        $('#settings-button').on('click', function () {
            window.location.href = '/parameters.html';
        });

        // ✅ CHARGEMENT INITIAL DES DONNÉES
        (async function(){
            try {
                if (window.awsWidgetsReady) {
                    await customElements.whenDefined('aws-table');
                } else {
                    await customElements.whenDefined('aws-table').catch(()=>{});
                }
            } catch(e) {
                // proceed even if waiting fails
            }
            loadAllData();
        })();

    });
</script>
 
</body>
</html>
